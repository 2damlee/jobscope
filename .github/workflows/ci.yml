name: CI

on:
  push:
    branches:
      - main
      - chore/deploy-foundation
      - chore/codebase-alignment
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check app pipeline tests

      - name: Compile check
        run: python -m compileall app pipeline tests

      - name: Run tests
        run: pytest -q