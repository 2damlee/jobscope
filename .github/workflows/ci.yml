name: CI

on:
  push:
    branches:
      - main
      - chore/deploy-foundation
      - chore/codebase-alignment
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobscope_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d jobscope_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jobscope_test
      PREFECT_LOGGING_TO_API_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check app pipeline tests

      - name: Compile check
        run: python -m compileall app pipeline tests

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q