services:
  db:
    image: postgres:15
    container_name: jobscope-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobscope
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobscope"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: jobscope-api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      DO_NOT_TRACK: "1"
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
    volumes:
      - .:/app
    command: >
      sh -c "python -m pipeline.wait_for_db &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data: