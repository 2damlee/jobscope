services:
  api:
    build: .
    container_name: jobscope-api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      DO_NOT_TRACK: "1"
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
    volumes:
      - .:/app
    command: >
      sh -c "python -m pipeline.wait_for_db &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"